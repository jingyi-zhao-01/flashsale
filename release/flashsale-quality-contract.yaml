apiVersion: flashsale.dev/v1alpha1
kind: FlashsaleQualityContract
metadata:
  name: flashsale
spec:
  perf:
    lanes:
      smoke:
        displayName: Smoke Test (10 TPS)
        invocation:
          type: make
          target: concurrency-smoke
      idempotencyLite:
        displayName: Idempotency Lite Replay
        invocation:
          type: make
          target: concurrency-idempotency-lite
      hotspot10Tps:
        displayName: Hotspot 10 TPS
        invocation:
          type: make
          target: concurrency-hotspot-10tps

  consistency:
    displayName: Runtime Consistency Harness
    invocation:
      type: python
      script: ./flashsale/perf/python/consistency_harness.py
