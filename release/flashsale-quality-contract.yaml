apiVersion: flashsale.dev/v1alpha1
kind: FlashsaleQualityContract
metadata:
  name: flashsale
spec:
  perf:
    cadence:
      - id: smoke
        displayName: Smoke Test (10 TPS)
        pauseBeforeSeconds: 180
        invocation:
          type: make
          target: concurrency-smoke
      - id: idempotencyLite
        displayName: Idempotency Lite Replay
        invocation:
          type: make
          target: concurrency-idempotency-lite
      - id: hotspot10Tps
        displayName: Hotspot 10 TPS
        invocation:
          type: make
          target: concurrency-hotspot-10tps
