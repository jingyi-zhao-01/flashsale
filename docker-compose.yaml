services:
  flashsale-db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: flashsale
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d flashsale"]
      interval: 5s
      timeout: 5s
      retries: 20

  flashsale-redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  flashsale-kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 256M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://flashsale-kafka:9092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30

  flashsale-kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        rpk topic create \
          -X brokers=flashsale-kafka:9092 \
          flashsale.order.terminalization.v1 \
          flashsale.order.terminalization.retry.v1 \
          flashsale.order.terminalization.dlq.v1 || true
    depends_on:
      flashsale-kafka:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: user_service
    ports:
      - "18001:8001"
    depends_on:
      flashsale-db:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: product_service
    ports:
      - "18002:8002"
    depends_on:
      flashsale-db:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: order_service
      PRODUCT_SERVICE_URL: http://product-service:8002
      USER_SERVICE_URL: http://user-service:8001
      ORDER_PENDING_TTL_SECONDS: 1
      REDIS_URL: redis://flashsale-redis:6379/0
      RESERVE_ADMISSION_MAX_INFLIGHT: 2
      TERMINALIZATION_QUEUE_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: flashsale-kafka:9092
      KAFKA_TERMINALIZATION_CONSUMER_POLL_SECONDS: 0.1
    ports:
      - "18003:8003"
    depends_on:
      flashsale-db:
        condition: service_healthy
      flashsale-redis:
        condition: service_healthy
      flashsale-kafka:
        condition: service_healthy
      flashsale-kafka-init:
        condition: service_completed_successfully
      product-service:
        condition: service_started
      user-service:
        condition: service_started

  order-worker:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    command: ["python", "-m", "app.entrypoints.worker_main"]
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: order_service
      PRODUCT_SERVICE_URL: http://product-service:8002
      USER_SERVICE_URL: http://user-service:8001
      ORDER_PENDING_TTL_SECONDS: 1
      REDIS_URL: redis://flashsale-redis:6379/0
      RESERVE_ADMISSION_MAX_INFLIGHT: 2
      TERMINALIZATION_QUEUE_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: flashsale-kafka:9092
      KAFKA_TERMINALIZATION_CONSUMER_POLL_SECONDS: 0.1
    depends_on:
      flashsale-db:
        condition: service_healthy
      flashsale-redis:
        condition: service_healthy
      flashsale-kafka:
        condition: service_healthy
      flashsale-kafka-init:
        condition: service_completed_successfully
      product-service:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started
