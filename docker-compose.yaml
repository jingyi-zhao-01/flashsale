services:
  flashsale-db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: flashsale
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d flashsale"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: user_service
    ports:
      - "18001:8001"
    depends_on:
      flashsale-db:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: product_service
    ports:
      - "18002:8002"
    depends_on:
      flashsale-db:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://test:test@flashsale-db:5432/flashsale
      DB_SCHEMA: order_service
      PRODUCT_SERVICE_URL: http://product-service:8002
      USER_SERVICE_URL: http://user-service:8001
      ORDER_PENDING_TTL_SECONDS: 1
    ports:
      - "18003:8003"
    depends_on:
      flashsale-db:
        condition: service_healthy
      product-service:
        condition: service_started
      user-service:
        condition: service_started
