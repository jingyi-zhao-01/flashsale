name: Flashsales Deploy Pre

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'shared/**'
      - 'user-service/**'
      - 'product-service/**'
      - 'order-service/**'
      - 'release/**'
      - 'scripts/**'
      - 'docker-compose.yaml'
      - '.github/workflows/flashsales-deploy-pre.yml'
      - '.github/scripts/notify-discord.sh'
  pull_request:
    paths:
      - 'shared/**'
      - 'user-service/**'
      - 'product-service/**'
      - 'order-service/**'
      - 'release/**'
      - 'scripts/**'
      - 'docker-compose.yaml'
      - '.github/workflows/flashsales-deploy-pre.yml'
      - '.github/scripts/notify-discord.sh'

concurrency:
  group: flashsales-deploy-pre-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  product-service-unit-gate:
    name: Unit Gate - Product Service Lifecycle, Contract, And Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install product-service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./shared
          python -m pip install -r product-service/requirements.txt

      - name: Run product-service unit tests
        working-directory: product-service
        run: |
          python -m unittest discover -s tests/unit -t . -p 'test_*.py'

  order-service-unit-gate:
    name: Unit Gate - Order Service Lifecycle, Webhooks, Contract, And Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install order-service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./shared
          python -m pip install -r order-service/requirements.txt

      - name: Run order-service unit tests
        working-directory: order-service
        run: |
          python -m unittest discover -s tests/unit -t . -p 'test_*.py'

  product-service-compose-integration-gate:
    name: Integration Gate - Docker Compose Product Service
    runs-on: ubuntu-latest
    needs:
      - product-service-unit-gate
      - order-service-unit-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker Compose is available
        run: docker compose version

      - name: Run product-service compose integration
        run: |
          python3 scripts/flashsale_compose_integration.py --suite product

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yaml logs --no-color || true

  order-service-compose-integration-gate:
    name: Integration Gate - Docker Compose Order Service
    runs-on: ubuntu-latest
    needs:
      - product-service-unit-gate
      - order-service-unit-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker Compose is available
        run: docker compose version

      - name: Run order-service compose integration
        run: |
          python3 scripts/flashsale_compose_integration.py --suite order

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yaml logs --no-color || true

  build-and-push:
    name: Build and Push Images
    needs:
      - product-service-unit-gate
      - order-service-unit-gate
      - product-service-compose-integration-gate
      - order-service-compose-integration-gate
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        needs.product-service-unit-gate.result == 'success' &&
        needs.order-service-unit-gate.result == 'success' &&
        needs.product-service-compose-integration-gate.result == 'success' &&
        needs.order-service-compose-integration-gate.result == 'success'
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flashsales-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/flashsales-${{ matrix.service }}:latest

  notify-discord:
    name: Notify Discord
    needs:
      - product-service-unit-gate
      - order-service-unit-gate
      - product-service-compose-integration-gate
      - order-service-compose-integration-gate
      - build-and-push
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Flashsales Deploy Pre
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh

  dispatch-homelab-cloud:
    name: Dispatch Homelab Cloud Deploy
    needs:
      - product-service-unit-gate
      - order-service-unit-gate
      - product-service-compose-integration-gate
      - order-service-compose-integration-gate
      - build-and-push
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.product-service-unit-gate.result == 'success' &&
        needs.order-service-unit-gate.result == 'success' &&
        needs.product-service-compose-integration-gate.result == 'success' &&
        needs.order-service-compose-integration-gate.result == 'success' &&
        needs.build-and-push.result == 'success'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger homelab-cloud deploy
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMELAB_CLOUD_REPO_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ vars.HOMELAB_CLOUD_REPO || 'jingyi-zhao-01/homelab-cloud' }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "HOMELAB_CLOUD_REPO_DISPATCH_TOKEN secret is missing"
            exit 1
          fi

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d @- <<EOF
          {
            "event_type": "flashsale-release-ready",
            "client_payload": {
              "flashsale_repository": "${{ github.repository }}",
              "flashsale_ref": "${{ github.ref_name }}",
              "flashsale_sha": "${{ github.sha }}",
              "flashsale_image_tag": "${{ github.sha }}",
              "flashsale_run_id": "${{ github.run_id }}",
              "flashsale_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
          }
          EOF
